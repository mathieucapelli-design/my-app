<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Simulateur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background:#121212;
    color:white;
    padding:15px;
}

.container {
    max-width:420px;
    margin:auto;
}

h1 {
    text-align:center;
    color:#00bfff;
    margin-bottom:25px;
}

/* CARTES */
.card {
    background:#1e1e1e;
    padding:16px;
    border-radius:14px;
    margin-bottom:18px;
}

/* TITRES */
.section-title {
    font-size:15px;
    color:#00bfff;
    margin-bottom:12px;
}

/* CHAMPS */
.field {
    margin-bottom:14px;
}

label {
    font-size:13px;
    color:#aaa;
    margin-bottom:5px;
    display:block;
}

input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #2a2a2a;
    color: white;
    box-sizing: border-box; /* sécurité */
}

.container {
    padding: 0 5px;
}

/* BOUTON */
button {
    width:100%;
    padding:16px;
    font-size:18px;
    background:#00aaff;
    border:none;
    border-radius:12px;
    color:white;
    margin-top:10px;
}

/* RESULTAT */
.result {
    background:#00aaff;
    padding:18px;
    border-radius:14px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:18px;
}

.result small {
    display:block;
    font-size:15px;
    margin-top:10px;
    font-weight:normal;
}

/* MONTAGES */
.montage-item {
    background:#2a2a2a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.montage-item input {
    margin-bottom:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚙️ Simulateur v2.5 </h1>

<!-- ENTREE -->
<div class="card">
<div class="section-title">Entrée pièce</div>

<div class="field">
<label>Surface (dm²)</label>
<input id="surface" type="number" step="0.01" inputmode="decimal">
</div>

<div class="field">
<label>Épaisseur MAX (µm)</label>
<input id="epaisseurMax" type="number" step="0.1" inputmode="decimal">
</div>

<div class="field">
<label>Géométrie</label>
<select id="facteur">
    <option value="1">Simple</option>
    <option value="1.1">Moyenne</option>
    <option value="1.25">Complexe</option>
    <option value="1.4">Critique</option>
</select>
</div>

<div class="field">
<label>Montage</label>
<select id="montageSelect"></select>
</div>

<button id="btnCalc">Calculer</button>
</div>

<!-- RESULTAT -->
<div class="result" id="result">
Résultat affiché ici
</div>

<!-- PARAMETRES -->
<div class="card">
<div class="section-title">Paramètres</div>

<div class="field">
<label>Densité (A/dm²)</label>
<input id="densite" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Vitesse (µm/min)</label>
<input id="vitesse" type="number" inputmode="decimal">
</div>
</div>

<!-- MONTAGES -->
<div class="card">
<div class="section-title">Montages</div>
<div id="montages"></div>
</div>

</div>

<script>

let montages = [];

// INIT MONTAGES
function initMontages() {
    for (let i=0;i<4;i++) {
        let nom = localStorage.getItem("m_nom_"+i) || "Montage "+(i+1);
        let I = localStorage.getItem("m_I_"+i) || 0;
        montages.push({nom, I:parseFloat(I)});
    }
}

// AFFICHAGE MONTAGES
function afficherMontages() {

    let div = document.getElementById("montages");
    div.innerHTML = "";

    montages.forEach((m,i)=>{
        div.innerHTML += `
        <div class="montage-item">
            <input value="${m.nom}" onchange="saveNom(${i},this.value)">
            <input type="number" value="${m.I}" onchange="saveI(${i},this.value)" placeholder="Courant (A)">
        </div>`;
    });

    let sel = document.getElementById("montageSelect");
    sel.innerHTML = "";

    montages.forEach((m,i)=>{
        sel.innerHTML += `<option value="${i}">${m.nom}</option>`;
    });
}

// SAUVEGARDE
function saveNom(i,v){
    montages[i].nom = v;
    localStorage.setItem("m_nom_"+i,v);
    afficherMontages();
}

function saveI(i,v){
    montages[i].I = parseFloat(v);
    localStorage.setItem("m_I_"+i,v);
}

function charger(){
    densite.value = localStorage.getItem("densite") || 4;
    vitesse.value = localStorage.getItem("vitesse") || 1.15;
}

function saveParams(){
    localStorage.setItem("densite",densite.value);
    localStorage.setItem("vitesse",vitesse.value);
}

// CALCUL
function calcul(){

    let S = parseFloat(surface.value);
    let eMax = parseFloat(epaisseurMax.value);
    let C = parseFloat(facteur.value);
    let J = parseFloat(densite.value);
    let V = parseFloat(vitesse.value);

    let idx = montageSelect.value;
    let I_montage = montages[idx].I;

    if(!S || !eMax || !J || !V){
        result.innerHTML = "⚠️ Remplis les champs";
        return;
    }

    let eMoy = eMax / C;
    let t_min = eMoy / V;
    let t_sec = t_min * 60;

    let I_total = (J * S) + I_montage;

    result.innerHTML =
        "⏱ " + t_sec.toFixed(0) + " sec" +
        "<small>" +
        "Épaisseur moy : "+eMoy.toFixed(2)+" µm<br>" +
        "Courant total : "+I_total.toFixed(2)+" A" +
        "</small>";
}

// INIT
initMontages();
afficherMontages();
charger();

btnCalc.addEventListener("click", calcul);
densite.addEventListener("input", saveParams);
vitesse.addEventListener("input", saveParams);

</script>

</body>
</html>
