<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Simulateur CD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #00bfff;
    margin-bottom: 30px;
}

.field {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #ccc;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #1e1e1e;
    color: white;
}

.desc {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    background: #00aaff;
    border: none;
    border-radius: 12px;
    color: white;
    margin-top: 10px;
}

.result {
    margin: 25px 0 30px 0;
    padding: 15px;
    background: #1e1e1e;
    border-radius: 10px;
    font-size: 22px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>⚙️ Cadmiage</h1>

<div class="field">
    <label>Surface (dm²)</label>
    <input id="surface" type="number" step="0.01" inputmode="decimal" placeholder="Ex : 1.5">
</div>

<div class="field">
    <label>Épaisseur (µm)</label>
    <input id="epaisseur" type="number" step="0.1" inputmode="decimal" placeholder="Ex : 15">
</div>

<button id="btnCalc">Calculer</button>

<div class="result" id="result"></div>

<div class="field">
    <label>Densité cible (A/dm²)</label>
    <input id="densite" type="number" value="4" step="0.1" inputmode="decimal">
    <div class="desc">Réglage du courant par surface</div>
</div>

<div class="field">
    <label>Vitesse dépôt (µm/min)</label>
    <input id="vitesse" type="number" value="1.15" step="0.01" inputmode="decimal">
    <div class="desc">Vitesse réelle du bain à cette densité</div>
</div>

</div>

<script>

function calcul() {

    let S = parseFloat(document.getElementById("surface").value);
    let e = parseFloat(document.getElementById("epaisseur").value);
    let J = parseFloat(document.getElementById("densite").value);
    let V = parseFloat(document.getElementById("vitesse").value);

    if (!S || !e || !J || !V) {
        document.getElementById("result").innerHTML = "⚠️ Remplis les champs";
        return;
    }

    let I = J * S;

    let t_min = e / V;
    let t_sec = t_min * 60;

    document.getElementById("result").innerHTML =
        "🔌 Courant : <b>" + I.toFixed(2) + " A</b><br>" +
        "⏱ Temps : <b>" + t_sec.toFixed(0) + " sec</b> (" + t_min.toFixed(1) + " min)";
}

// Event listener mobile compatible
document.getElementById("btnCalc").addEventListener("click", calcul);

</script>

</body>
</html>
